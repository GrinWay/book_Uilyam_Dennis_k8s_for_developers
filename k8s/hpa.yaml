apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: app-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: app-deploy-v1
  # Диапазон, может изменяться на любое промежуточное значение
  minReplicas: 1
  maxReplicas: 2 # 10
  metrics:
#    - type: External
#      external:
#        metric:
#          name: lb_requests_per_second
#          selector:
#            matchLabels:
#              ?
#        target:
#          type: AverageValue
#          averageValue: 10
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 20 # 50