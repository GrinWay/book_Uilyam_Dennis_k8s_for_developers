# Определяет какой контейнерный runtime использовать для pod
# Исключает уязвимость "побег из контейнера" на host

# gvisor:
#   Реализует API ядра Linux
#   перехватывает системные вызовы между контейнером и ядром Linux

# gvisor - требует наличия gvisor на Node!
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: gvisor
handler: gvisor